<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IRL Toolkit — Dashboard</title>
<style>
  :root {
    --bg: #0f1115; --card: #181b22; --card2: #1e222b; --border: #2a2f3a;
    --text: #e6e8ec; --muted: #8b93a3;
    --green: #2ecc71; --red: #e74c3c; --amber: #f1c40f;
    --accent: #6c8cff; --blue: #3b82f6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  nav {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(24,27,34,.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border); padding: 12px 18px;
  }
  nav .brand { font-weight: 700; font-size: 16px; }
  nav .links { display: flex; gap: 8px; }
  nav .links a {
    text-decoration: none; font-size: 13px; font-weight: 600;
    padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
    color: var(--text); background: var(--card);
  }
  nav .links a.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

  .wrap { max-width: 1060px; margin: 0 auto; padding: 18px 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .span2 { grid-column: 1 / -1; }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .card h2 {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted); margin: 0 0 14px;
  }
  .badge { padding: 2px 10px; border-radius: 6px; font-size: 12px;
           font-weight: 700; letter-spacing: 0; text-transform: none; }
  .badge.on  { background: rgba(46,204,113,.18); color: var(--green); }
  .badge.off { background: rgba(231,76,60,.18);  color: var(--red); }
  .badge.brb { background: rgba(241,196,15,.18); color: var(--amber); }

  button {
    border: 0; border-radius: 8px; padding: 9px 16px; font-weight: 600;
    font-size: 14px; cursor: pointer; color: #fff; background: var(--accent);
  }
  button:disabled { opacity: .5; cursor: default; }
  .bigbtn { width: 100%; padding: 13px; font-size: 15px; margin-bottom: 10px; }
  .start { background: var(--green); }
  .stop  { background: var(--red); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-blue { background: var(--blue); }
  .btn-gray { background: var(--card2); border: 1px solid var(--border); }
  .btn-warn { background: #b7791f; }

  .row { display: flex; align-items: center; justify-content: space-between;
         gap: 10px; margin-bottom: 8px; }
  .muted { color: var(--muted); font-size: 13px; }
  input[type=password], input[type=text] {
    flex: 1; min-width: 0; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px;
  }

  .ingest {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 10px;
  }
  .ingest .top { display: flex; align-items: center; justify-content: space-between;
                 margin-bottom: 10px; gap: 8px; flex-wrap: wrap; }
  .ingest .nm { font-weight: 700; }
  .ingest .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .ingest .kbps { color: var(--muted); font-size: 13px; margin-left: 8px; }

  .scenebtn {
    display: block; width: 100%; margin-bottom: 8px; padding: 11px;
    background: var(--card2); border: 1px solid var(--border); color: var(--text);
  }
  .scenebtn.active { background: var(--green); border-color: var(--green); color: #fff; }

  #previewbox { position: relative; background: #000; border-radius: 8px;
                overflow: hidden; aspect-ratio: 16 / 9; }
  #preview { width: 100%; height: 100%; display: block; }
  #nosignal {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: var(--muted); font-size: 14px;
    background: repeating-linear-gradient(45deg, #0a0c10, #0a0c10 12px,
                #0e1015 12px, #0e1015 24px);
  }
  #chart { width: 100%; height: 160px; display: block; }

  #toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
           background: var(--card); border: 1px solid var(--border);
           padding: 10px 18px; border-radius: 10px; display: none; z-index: 20; }
</style>
</head>
<body>
<nav>
  <span class="brand">IRL Toolkit</span>
  <span class="links">
    <a class="primary" href="/obs/vnc.html?path=obs/websockify&autoconnect=true"
       target="_blank">Remote OBS</a>
    <a href="#" id="logout">Sign out</a>
  </span>
</nav>

<div class="wrap"><div class="grid">

  <div class="card">
    <h2>Stream <span class="badge off" id="streambadge">OFFLINE</span></h2>
    <button class="bigbtn start" id="start">&#9654;&nbsp; Start</button>
    <button class="bigbtn stop" id="stop">&#9632;&nbsp; Stop</button>
    <div class="row"><span class="muted">Dropped frames</span>
      <span class="muted" id="dropped">—</span></div>
  </div>

  <div class="card">
    <h2>Scene <span class="badge on" id="scenebadge">—</span></h2>
    <div id="scenes"></div>
  </div>

  <div class="card span2">
    <h2>Ingest</h2>
    <div id="ingests"></div>
    <div class="row" style="margin-top:12px">
      <input id="newingest" type="text" placeholder="New ingest name (e.g. Second Ingest)">
      <button id="addingest" class="btn-blue">Add ingest</button>
    </div>
    <div class="muted">Publish to a specific ingest with stream ID
      <code>publish:&lt;path&gt;:user:pass</code> — same SRTLA/SRT/RTMP ports.</div>
  </div>

  <div class="card">
    <h2>Ingest preview <span class="muted" style="text-transform:none">real-time</span></h2>
    <div id="previewbox">
      <video id="preview" muted playsinline autoplay></video>
      <div id="nosignal">No signal</div>
    </div>
  </div>

  <div class="card">
    <h2>Ingest bitrate <span class="muted" style="text-transform:none">past 60 sec</span></h2>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h2>Twitch stream key</h2>
    <div class="row">
      <input id="key" type="password" placeholder="paste stream key">
      <button id="savekey">Save</button>
    </div>
    <div class="muted" id="keystate"></div>
  </div>

  <div class="card">
    <h2>BRB screen</h2>
    <div class="row">
      <input id="brbfile" type="file" accept="video/*,image/*">
      <button id="upload">Upload</button>
    </div>
    <div class="muted" id="brbstate"></div>
  </div>

</div></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script>
const $ = id => document.getElementById(id);

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

async function post(url, body, isForm) {
  const opts = { method: 'POST' };
  if (body) {
    if (isForm) opts.body = body;
    else { opts.body = JSON.stringify(body);
           opts.headers = { 'Content-Type': 'application/json' }; }
  }
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
  return r.json();
}

// ---- Ingest preview (LL-HLS from MediaMTX via /preview/) ----
const video = $('preview');
let hls = null, previewPath = null;

function startPreview(path) {
  if (previewPath === path) return;
  stopPreview();
  previewPath = path;
  const url = `/preview/${path}/index.m3u8`;
  $('nosignal').style.display = 'none';
  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;                  // Safari/iOS: native HLS
    video.play().catch(() => {});
  } else if (window.Hls && Hls.isSupported()) {
    hls = new Hls({ lowLatencyMode: true });
    hls.loadSource(url);
    hls.attachMedia(video);
  }
}

function stopPreview() {
  previewPath = null;
  $('nosignal').style.display = 'flex';
  if (hls) { hls.destroy(); hls = null; }
  video.removeAttribute('src'); video.load();
}

// ---- Bitrate chart (rolling 60s, canvas) ----
const samples = [];   // {t, kbps}
function drawChart() {
  const c = $('chart'), ctx = c.getContext('2d');
  const W = c.width = c.clientWidth * devicePixelRatio;
  const H = c.height = 160 * devicePixelRatio;
  ctx.clearRect(0, 0, W, H);
  const now = Date.now(), span = 60000;
  const pts = samples.filter(s => now - s.t < span);
  const max = Math.max(1000, ...pts.map(p => p.kbps)) * 1.15;
  // grid
  ctx.strokeStyle = 'rgba(139,147,163,.15)'; ctx.lineWidth = 1;
  ctx.font = `${11 * devicePixelRatio}px sans-serif`;
  ctx.fillStyle = 'rgba(139,147,163,.7)';
  for (let i = 1; i <= 3; i++) {
    const y = H - (H - 18) * i / 3 - 4;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.fillText(`${Math.round(max * i / 3 / 100) / 10} Mbps`, 6, y - 4);
  }
  if (pts.length < 2) return;
  // line + fill
  ctx.beginPath();
  pts.forEach((p, i) => {
    const x = W - (now - p.t) / span * W;
    const y = H - 4 - (H - 22) * (p.kbps / max);
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  });
  ctx.strokeStyle = '#6c8cff'; ctx.lineWidth = 2 * devicePixelRatio; ctx.stroke();
  ctx.lineTo(W, H); ctx.lineTo(W - (now - pts[0].t) / span * W, H); ctx.closePath();
  ctx.fillStyle = 'rgba(108,140,255,.15)'; ctx.fill();
}

// ---- Ingest rows ----
const prevBytes = {};   // path -> {bytes, t}
function ingestRow(ing, kbps) {
  const div = document.createElement('div');
  div.className = 'ingest';
  const online = ing.online;
  div.innerHTML = `
    <div class="top">
      <span class="nm">${ing.name}
        <span class="kbps">${online && kbps ? (kbps/1000).toFixed(1) + ' Mbps' : ''}</span>
      </span>
      <span class="badge ${online ? 'on' : 'off'}">${online ? 'Online' : 'Offline'}</span>
    </div>
    <div class="actions">
      <button class="btn-sm btn-blue mute">${ing.muted ? 'Unmute' : 'Mute'}</button>
      <button class="btn-sm btn-warn fix">&#128295; Fix</button>
      ${ing.builtin ? '' : '<button class="btn-sm btn-gray del">Remove</button>'}
    </div>`;
  div.querySelector('.mute').onclick = () =>
    post(`/api/ingests/${ing.path}/mute`).then(r =>
      toast(`${ing.name} ${r.muted ? 'muted' : 'unmuted'}`)).catch(e => toast(e.message));
  div.querySelector('.fix').onclick = () =>
    post(`/api/ingests/${ing.path}/fix`).then(() =>
      toast(`${ing.name}: source restarted`)).catch(e => toast(e.message));
  const del = div.querySelector('.del');
  if (del) del.onclick = () => {
    if (!confirm(`Remove ${ing.name}?`)) return;
    fetch(`/api/ingests/${ing.path}`, { method: 'DELETE' })
      .then(() => toast('Removed')).catch(e => toast(e.message));
  };
  return div;
}

// ---- Main refresh loop ----
async function refresh() {
  let s;
  try { s = await (await fetch('/api/status')).json(); }
  catch { return; }
  const w = s.watchdog, o = s.obs, sc = s.scenes, c = s.config;

  // stream card
  if (o) {
    const b = $('streambadge');
    b.textContent = o.streaming ? 'LIVE' : 'OFFLINE';
    b.className = 'badge ' + (o.streaming ? 'on' : 'off');
    $('dropped').textContent =
      o.total_frames ? `${o.dropped_frames} / ${o.total_frames}` : '—';
  }

  // scene card
  if (sc) {
    const b = $('scenebadge');
    b.textContent = sc.current;
    b.className = 'badge ' + (sc.current === 'BRB' ? 'brb' : 'on');
    const box = $('scenes'); box.innerHTML = '';
    sc.all.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'scenebtn' + (name === sc.current ? ' active' : '');
      btn.textContent = name;
      btn.onclick = () => post('/api/scene', { name })
        .then(refresh).catch(e => toast(e.message));
      box.appendChild(btn);
    });
  }

  // ingest card + bitrate + preview
  const box = $('ingests'); box.innerHTML = '';
  const now = Date.now();
  let mainKbps = 0, previewCandidate = null;
  s.ingests.forEach(ing => {
    let kbps = 0;
    const prev = prevBytes[ing.path];
    if (prev && ing.bytes_received > prev.bytes) {
      kbps = Math.round((ing.bytes_received - prev.bytes) * 8 / (now - prev.t));
    }
    prevBytes[ing.path] = { bytes: ing.bytes_received, t: now };
    if (ing.builtin) {
      mainKbps = (w && w.ingest_bitrate_kbps) || kbps;
      if (ing.online) previewCandidate = ing.path;
    } else if (!previewCandidate && ing.online) {
      previewCandidate = ing.path;
    }
    box.appendChild(ingestRow(ing, ing.builtin ? mainKbps : kbps));
  });
  previewCandidate ? startPreview(previewCandidate) : stopPreview();
  samples.push({ t: now, kbps: mainKbps });
  while (samples.length && now - samples[0].t > 65000) samples.shift();
  drawChart();

  $('keystate').textContent = c.stream_key_set ? 'Key is set ✓' : 'No key set yet';
  $('brbstate').textContent = c.brb_file ? `Current: ${c.brb_file}` : 'No BRB media yet';
}

// ---- Buttons ----
$('start').onclick = () =>
  post('/api/stream/start').then(() => toast('Stream started'))
    .catch(e => toast(e.message));
$('stop').onclick = () => {
  if (confirm('Stop the Twitch stream?'))
    post('/api/stream/stop').then(() => toast('Stream stopped'))
      .catch(e => toast(e.message));
};
$('savekey').onclick = () =>
  post('/api/stream-key', { key: $('key').value })
    .then(() => { $('key').value = ''; toast('Key saved'); refresh(); })
    .catch(e => toast(e.message));
$('upload').onclick = () => {
  const f = $('brbfile').files[0];
  if (!f) return toast('Pick a file first');
  const fd = new FormData(); fd.append('file', f);
  post('/api/brb', fd, true)
    .then(r => { toast('BRB updated: ' + r.file); refresh(); })
    .catch(e => toast(e.message));
};
$('addingest').onclick = () => {
  const name = $('newingest').value.trim();
  if (!name) return toast('Give the ingest a name');
  post('/api/ingests', { name })
    .then(r => { $('newingest').value = '';
                 toast(`Ingest added — publish to publish:${r.path}:user:pass`);
                 refresh(); })
    .catch(e => toast(e.message));
};
$('logout').onclick = (e) => {
  e.preventDefault();
  post('/api/logout').finally(() => location.href = '/login');
};

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
